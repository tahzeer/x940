name: release

on:
  push:
    tags: ["[0-9]*"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches version
        run: |
          tag_ver="${{ github.ref_name }}"
          cargo_ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$tag_ver" != "$cargo_ver" ]; then
            echo "Tag $tag_ver does not match Cargo.toml $cargo_ver"
            exit 1
          fi
          echo "Releasing version $cargo_ver"

      - name: Run tests
        run: cargo test -p x940rs -p x940

  publish-crates:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish x940rs
        run: cargo publish -p x940rs --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish x940 (CLI)
        run: cargo publish -p x940 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-wheels:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release -m crates/python/Cargo.toml

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/*.whl

  publish-pypi:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Publish to PyPI
        run: pip install twine && twine upload *-none-*.whl *.whl --username __token__ --password ${{ secrets.PYPI_TOKEN }}
