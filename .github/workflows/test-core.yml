name: test-core

on:
  push:
    branches: [master]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Run tests
        run: cargo test -p x940rs -p x940

  proptest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run property-based tests
        run: cargo test -p x940rs -- proptests
        timeout-minutes: 15
