name: test-cli

on:
  push:
    branches: [master]
    paths:
      - 'crates/core/**'
      - 'crates/cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test-cli.yml'
  pull_request:
    branches: ["**"]
    paths:
      - 'crates/core/**'
      - 'crates/cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test-cli.yml'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('**/Cargo.toml') }}

      - name: Run CLI integration tests
        run: cargo test -p x940
