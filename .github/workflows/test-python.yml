name: test-python

on:
  push:
    branches: [master]
    paths:
      - "crates/core/**"
      - "crates/python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/test-python.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "crates/core/**"
      - "crates/python/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/test-python.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install build deps
        run: |
          uv venv
          uv pip install maturin pytest

      - name: Build Python binding
        run: uv run maturin develop -m crates/python/Cargo.toml

      - name: Run Python tests
        run: uv run pytest crates/python/tests/ -v
